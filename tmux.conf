# Only program that doesn't use XDG_CONFIG_HOME :(

# Eliminate delay on ESC key
set -sg escape-time 0


# Enable mouse mode (tmux 2.1 and above)
set -g mouse on


# APPEARANCE
# don't rename windows automatically
set-option -g allow-rename off


# KEYBINDINGS
# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

