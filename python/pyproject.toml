[tool.black]
line-length = 88
skip_magic_trailing_comma = true

[tool.isort]
profile = "black"
multi_line_output = 3
float_to_top = true

[tool.mypy]
# see what this enables with mypy --help | grep -A 8 'Strict mode;'
strict = true
no_implicit_reexport = false # causes lag and issues with spacy
disallow_any_explicit = true
show_column_numbers = true
show_error_codes = true

# incremental = false
# cache-dir = "/dev/null"

# plugins = "numpy.typing.mypy_plugin"

[tool.pylint.master]
# http://pylint.pycqa.org/en/latest/technical_reference/extensions.html
load-plugins = """
pylint.extensions.broad_try_clause,
pylint.extensions.emptystring,
pylint.extensions.code_style,
pylint.extensions.comparetozero,
pylint.extensions.confusing_elif,
pylint.extensions.bad_builtin,
pylint.extensions.mccabe,
pylint.extensions.docstyle,
pylint.extensions.overlapping_exceptions,
pylint.extensions.docparams,
pylint.extensions.empty_comment,
pylint_flask_sqlalchemy,
"""

default-docstring-type = "sphinx"
# accept-no-param-doc = false
# accept-no-raise-doc = false
# accept-no-return-doc = false
# accept-no-yields-doc = false
disable = """
logging-fstring-interpolation,
compare-to-zero
"""
good-names = "i,j,k,_,T"

# extension-pkg-whitelist="PyQt6,ujson,websockets"

[tool.pytest.ini_options]
python_files = "*.py"
